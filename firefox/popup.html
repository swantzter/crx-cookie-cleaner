<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: CanvasText;
      background: Canvas;
      color-scheme: light dark;
    }
    button {
      width: 100%;
      padding: 8px;
      cursor: pointer;
      background: #c23616;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover {
      background: #a02010;
    }
    #result {
      margin-top: 8px;
      white-space: pre-wrap;
      font-size: 12px;
      color: GrayText;
    }
    #result.success { color: light-dark(#1a7f37, #3fb950); }
    #result.error { color: light-dark(#c23616, #f85149); }
  </style>
</head>
<body>
  <button id="clean">Remove matching cookies</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
